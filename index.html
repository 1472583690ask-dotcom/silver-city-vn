  <script>
/**
 * ========================================
 *  白银之城 · 渲染器
 *  Silver City VN - Renderer
 * ========================================
 *
 *  负责: 文本显示(打字机)、角色立绘/占位、背景/占位、选择UI、特效
 *  当素材图片不存在时，自动降级为带颜色的文字占位符
 */

const VNRenderer = (function() {
  'use strict';

  // ==================== 背景占位配色 ====================
  var _bgPalette = {
    'black':        { color: '#050508', labelColor: '#333' },
    'bedroom':      { color: '#1a1620', labelColor: '#8b7355', glow: 'rgba(180,140,100,0.15)' },
    'staircase':    { color: '#181c24', labelColor: '#7b8ca0', glow: 'rgba(120,140,160,0.12)' },
    'wild_path':    { color: '#141e16', labelColor: '#6b9b6b', glow: 'rgba(100,160,100,0.12)' },
    'wild_river':   { color: '#101c22', labelColor: '#5b9bae', glow: 'rgba(80,150,170,0.12)' },
    'wild_sunset':  { color: '#1c1410', labelColor: '#c87848', glow: 'rgba(200,120,70,0.15)' },
    'town_street':  { color: '#18181e', labelColor: '#a0a0b8', glow: 'rgba(160,160,190,0.12)' },
    'town_cafe':    { color: '#1a1612', labelColor: '#b8956e', glow: 'rgba(180,150,110,0.15)' },
    'town_flower':  { color: '#181420', labelColor: '#b08ab8', glow: 'rgba(170,140,190,0.15)' },
    'silver_city_night': { color: '#0a0c18', labelColor: '#8090c0', glow: 'rgba(120,140,200,0.15)' },
    'dark_alley':   { color: '#0c0a0c', labelColor: '#666', glow: 'rgba(100,100,110,0.1)' },
    'moonlit_garden':{ color: '#101820', labelColor: '#90a8c8', glow: 'rgba(140,170,210,0.15)' }
  };

  function _getBgPalette(bgId) {
    return _bgPalette[bgId] || { color: '#0a0a0f', labelColor: '#555', glow: 'rgba(80,80,90,0.1)' };
  }

  // ==================== DOM 引用 ====================
  var _els = {};

  function init() {
    _els = {
      gameContainer:   document.getElementById('game-container'),
      bgLayer:         document.getElementById('bg-layer'),
      charLayer:       document.getElementById('char-layer'),
      textBox:         document.getElementById('text-box'),
      nameTag:         document.getElementById('name-tag'),
      dialogueText:    document.getElementById('dialogue-text'),
      choiceContainer: document.getElementById('choice-container'),
      clickIndicator:  document.getElementById('click-indicator'),
      overlay:         document.getElementById('overlay'),
      titleScreen:     document.getElementById('title-screen'),
      menuPanel:       document.getElementById('menu-panel'),
      settingsPanel:   document.getElementById('settings-panel'),
      saveLoadPanel:   document.getElementById('save-load-panel'),
      endingScreen:    document.getElementById('ending-screen'),
      endingText:      document.getElementById('ending-text')
    };
  }

  // ==================== 文本显示 ====================

  var _typewriterTimer = null;
  var _typewriterResolve = null;

  function showDialogue(character, text, charConfig, speed, waitForClick) {
    clearTypewriter();

    // 设置名字标签
    if (character) {
      _els.nameTag.textContent = character;
      _els.nameTag.style.display = 'block';
      if (charConfig && charConfig.color) {
        _els.nameTag.style.color = charConfig.color;
        _els.nameTag.style.borderColor = charConfig.color;
      } else {
        _els.nameTag.style.color = '#8B9DC3';
        _els.nameTag.style.borderColor = 'rgba(192,192,220,0.15)';
      }
    } else {
      _els.nameTag.style.display = 'none';
    }

    _els.textBox.classList.add('visible');
    _els.dialogueText.textContent = '';
    hideChoices();
    hideClickIndicator();

    return typewrite(text, speed, waitForClick);
  }

  function showNarration(text, speed, waitForClick) {
    clearTypewriter();
    _els.nameTag.style.display = 'none';
    _els.textBox.classList.add('visible');
    _els.dialogueText.textContent = '';
    hideChoices();
    hideClickIndicator();
    return typewrite(text, speed, waitForClick);
  }

  function typewrite(text, speed, waitForClick) {
    return new Promise(function(resolve) {
      var chars = Array.from(text);
      var index = 0;
      var baseDelay = Math.max(10, 110 - speed);

      _typewriterTimer = setInterval(function() {
        if (index < chars.length) {
          _els.dialogueText.textContent += chars[index];
          index++;
        } else {
          clearTypewriter();
          if (waitForClick) {
            showClickIndicator();
          }
          _typewriterResolve = null;
          resolve();
        }
      }, baseDelay);

      _typewriterResolve = resolve;
    });
  }

  function skipTypewriter() {
    if (_typewriterTimer) {
      clearInterval(_typewriterTimer);
      _typewriterTimer = null;
      var line = VN.getCurrentLine();
      if (line && (line.type === 'dialogue' || line.type === 'narration')) {
        _els.dialogueText.textContent = line.text || '';
      }
      if (_typewriterResolve) {
        var r = _typewriterResolve;
        _typewriterResolve = null;
        r();
      }
    }
  }

  function isTyping() {
    return _typewriterTimer !== null;
  }

  function clearTypewriter() {
    if (_typewriterTimer) {
      clearInterval(_typewriterTimer);
      _typewriterTimer = null;
    }
    _typewriterResolve = null;
  }

  function showClickIndicator() {
    _els.clickIndicator.classList.add('visible');
  }

  function hideClickIndicator() {
    _els.clickIndicator.classList.remove('visible');
  }

  // ==================== 背景 ====================

  function setBackground(bgId, config, transition) {
    var bgData = config ? config.backgrounds[bgId] : null;
    var currentBg = _els.bgLayer.querySelector('.bg-image.active');

    // 尝试加载真实图片
    var loaded = false;
    if (bgData && bgData.file) {
      var imgPath = 'assets/backgrounds/' + bgData.file;
      var newBg = document.createElement('div');
      newBg.className = 'bg-image';
      newBg.style.backgroundImage = 'url(' + imgPath + ')';

      // 尝试预加载
      var testImg = new Image();
      testImg.onload = function() {
        // 图片存在，使用真实图片
        if (transition === 'fade') {
          newBg.classList.add('fade-in');
        }
        _els.bgLayer.appendChild(newBg);
        void newBg.offsetWidth;
        newBg.classList.add('active');
        if (currentBg) {
          setTimeout(function() {
            if (currentBg.parentNode) currentBg.parentNode.removeChild(currentBg);
          }, 600);
        }
        // 移除之前的占位背景
        var placeholder = _els.bgLayer.querySelector('.bg-placeholder');
        if (placeholder) placeholder.remove();
      };
      testImg.onerror = function() {
        // 图片不存在，使用占位
        _renderBgPlaceholder(bgId, transition, currentBg);
      };
      testImg.src = imgPath;
      loaded = true;
    }

    if (!loaded) {
      _renderBgPlaceholder(bgId, transition, currentBg);
    }
  }

  function _renderBgPlaceholder(bgId, transition, currentBg) {
    var palette = _getBgPalette(bgId);
    var bgData = VN.getConfig() ? VN.getConfig().backgrounds[bgId] : null;
    var label = bgData && bgData.desc ? bgData.desc : bgId;

    // 移除旧占位
    var old = _els.bgLayer.querySelector('.bg-placeholder');
    if (old) old.remove();

    var placeholder = document.createElement('div');
    placeholder.className = 'bg-placeholder';
    placeholder.setAttribute('data-bg', bgId);
    placeholder.style.background = 'radial-gradient(ellipse at center, ' +
      _lighten(palette.color, 0.2) + ' 0%, ' + palette.color + ' 70%)';

    // 场景名标签
    var labelEl = document.createElement('span');
    labelEl.className = 'bg-placeholder-label';
    labelEl.textContent = '「' + label + '」';
    labelEl.style.color = palette.labelColor;
    placeholder.appendChild(labelEl);

    // 光晕
    var glow = document.createElement('div');
    glow.className = 'bg-placeholder-glow';
    glow.style.boxShadow = '0 0 120px ' + palette.glow;
    placeholder.appendChild(glow);

    if (transition === 'fade') {
      placeholder.style.animation = 'bgPlaceholderFadeIn 0.6s ease forwards';
    }

    _els.bgLayer.appendChild(placeholder);

    // 移除旧背景
    if (currentBg) {
      setTimeout(function() {
        if (currentBg.parentNode) currentBg.parentNode.removeChild(currentBg);
      }, 600);
    }
  }

  function _lighten(hex, factor) {
    var r = parseInt(hex.slice(1,3), 16);
    var g = parseInt(hex.slice(3,5), 16);
    var b = parseInt(hex.slice(5,7), 16);
    r = Math.min(255, Math.round(r + (255 - r) * factor));
    g = Math.min(255, Math.round(g + (255 - g) * factor));
    b = Math.min(255, Math.round(b + (255 - b) * factor));
    return '#' + [r,g,b].map(function(c) {
      return c.toString(16).padStart(2, '0');
    }).join('');
  }

  // ==================== 角色立绘 / 占位符 ====================

  function showCharacter(charId, position, expression, charConfig, transition) {
    var charData = charConfig ? charConfig.characters[charId] : null;
    if (!charData) return;

    // 获取立绘文件名（兼容 sprites 和 expressions 两种键名）
    var sprites = charData.sprites || charData.expressions;
    var spriteFile = sprites && sprites[expression] ? sprites[expression] : null;

    // 移除该角色的旧元素
    var oldEl = _els.charLayer.querySelector('[data-char="' + charId + '"]');
    if (oldEl) oldEl.remove();

    if (spriteFile && typeof spriteFile === 'object') {
      spriteFile = spriteFile.file || null;
    }

    // 尝试加载真实立绘
    if (spriteFile) {
      var imgPath = 'assets/characters/' + spriteFile;
      _createSpriteElement(charId, position, expression, imgPath, charData, transition);
    } else {
      // 无素材 - 显示彩色占位符
      _createPlaceholderElement(charId, position, expression, charData, transition);
    }
  }

  function _createSpriteElement(charId, position, expression, imgPath, charData, transition) {
    var charEl = document.createElement('div');
    charEl.className = 'char-sprite';
    charEl.setAttribute('data-char', charId);
    charEl.style.backgroundImage = 'url(' + imgPath + ')';

    var testImg = new Image();
    testImg.onload = function() {
      charEl.className = 'char-sprite position-' + position;
      if (transition === 'fade') charEl.classList.add('fade-in');
      _els.charLayer.appendChild(charEl);
      void charEl.offsetWidth;
      charEl.classList.add('active');
    };
    testImg.onerror = function() {
      _createPlaceholderElement(charId, position, expression, charData, transition);
    };
    testImg.src = imgPath;
  }

  function _createPlaceholderElement(charId, position, expression, charData, transition) {
    var wrapper = document.createElement('div');
    wrapper.className = 'char-placeholder';
    wrapper.setAttribute('data-char', charId);
    wrapper.setAttribute('data-position', position);

    var color = charData.color || '#666';
    var name = charData.name || charId;

    // 占位"立绘"框
    var box = document.createElement('div');
    box.className = 'char-placeholder-box';
    box.style.borderColor = color;
    box.style.background = 'linear-gradient(180deg, ' +
      _alpha(color, 0.15) + ' 0%, ' +
      _alpha(color, 0.05) + ' 50%, ' +
      _alpha(color, 0.12) + ' 100%)';
    box.style.boxShadow = '0 0 40px ' + _alpha(color, 0.2) + ', inset 0 0 60px ' + _alpha(color, 0.06);

    // 名字
    var nameEl = document.createElement('div');
    nameEl.className = 'char-placeholder-name';
    nameEl.textContent = name;
    nameEl.style.color = color;
    nameEl.style.textShadow = '0 0 16px ' + _alpha(color, 0.4);

    // 表情描述
    var exprLabel = _getExpressionLabel(expression);
    var exprEl = document.createElement('div');
    exprEl.className = 'char-placeholder-expression';
    exprEl.textContent = exprLabel;
    exprEl.style.color = _lighten(color, 0.3);

    // 装饰线
    var line = document.createElement('div');
    line.className = 'char-placeholder-line';
    line.style.background = 'linear-gradient(90deg, transparent, ' + color + ', transparent)';

    box.appendChild(nameEl);
    box.appendChild(line);
    box.appendChild(exprEl);
    wrapper.appendChild(box);

    if (transition === 'fade') {
      wrapper.classList.add('placeholder-fade-in');
    }

    _els.charLayer.appendChild(wrapper);
    void wrapper.offsetWidth;
    wrapper.classList.add('active');
  }

  function _alpha(hex, a) {
    var r = parseInt(hex.slice(1,3), 16);
    var g = parseInt(hex.slice(3,5), 16);
    var b = parseInt(hex.slice(5,7), 16);
    return 'rgba(' + r + ',' + g + ',' + b + ',' + a + ')';
  }

  function _getExpressionLabel(expr) {
    var map = {
      'default': '通常',
      'smile': '微笑',
      'sad': '忧伤',
      'surprised': '惊讶',
      'excited': '兴奋',
      'confused': '困惑',
      'shocked': '震惊',
      'happy': '开心',
      'proud': '得意',
      'amazed': '赞叹',
      'determined': '坚定',
      'gentle': '温柔',
      'thoughtful': '沉思',
      'worried': '担忧',
      'sympathetic': '同情',
      'peaceful': '安详',
      'serious': '严肃'
    };
    return map[expr] || expr;
  }

  function hideCharacter(charId, transition) {
    var charEl = _els.charLayer.querySelector('[data-char="' + charId + '"]');
    if (!charEl) return;
    charEl.classList.remove('active');
    charEl.classList.add('fade-out');
    setTimeout(function() {
      if (charEl.parentNode) {
        charEl.parentNode.removeChild(charEl);
      }
    }, 500);
  }

  function updateCharacterExpression(charId, expression, charConfig) {
    var charData = charConfig ? charConfig.characters[charId] : null;
    if (!charData) return;

    var charEl = _els.charLayer.querySelector('[data-char="' + charId + '"]');
    if (!charEl) return;

    var sprites = charData.sprites || charData.expressions;
    var spriteFile = sprites && sprites[expression] ? sprites[expression] : null;

    if (charEl.classList.contains('char-sprite') && spriteFile) {
      if (typeof spriteFile === 'object') spriteFile = spriteFile.file;
      charEl.style.backgroundImage = 'url(assets/characters/' + spriteFile + ')';
    } else if (charEl.classList.contains('char-placeholder')) {
      // 更新占位符表情
      var exprEl = charEl.querySelector('.char-placeholder-expression');
      if (exprEl) {
        exprEl.textContent = _getExpressionLabel(expression);
      }
    }
  }

  function moveCharacter(charId, position, duration) {
    var charEl = _els.charLayer.querySelector('[data-char="' + charId + '"]');
    if (!charEl) return;
    charEl.style.transition = 'left ' + duration + 'ms ease, transform ' + duration + 'ms ease';
    charEl.setAttribute('data-position', position);
  }

  // ==================== 选择分支 ====================

  function showChoices(prompt, options) {
    _els.choiceContainer.innerHTML = '';

    if (prompt) {
      var promptEl = document.createElement('div');
      promptEl.className = 'choice-prompt';
      promptEl.textContent = prompt;
      _els.choiceContainer.appendChild(promptEl);
    }

    options.forEach(function(opt, index) {
      var btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.textContent = opt.text;
      btn.addEventListener('click', function() {
        VN.handleChoice(index);
      });
      btn.style.animationDelay = (index * 100) + 'ms';
      _els.choiceContainer.appendChild(btn);
    });

    _els.choiceContainer.classList.add('visible');
    hideClickIndicator();
  }

  function hideChoices() {
    _els.choiceContainer.classList.remove('visible');
    _els.choiceContainer.innerHTML = '';
  }

  // ==================== 屏幕效果 ====================

  function screenShake(intensity, duration) {
    var container = _els.gameContainer;
    var origTransform = container.style.transform || '';
    var shakeInterval = setInterval(function() {
      var x = (Math.random() - 0.5) * intensity * 2;
      var y = (Math.random() - 0.5) * intensity * 2;
      container.style.transform = 'translate(' + x + 'px, ' + y + 'px)';
    }, 30);

    setTimeout(function() {
      clearInterval(shakeInterval);
      container.style.transform = origTransform;
    }, duration);
  }

  function flash(color, duration) {
    _els.overlay.style.backgroundColor = color;
    _els.overlay.style.opacity = '0.8';
    _els.overlay.classList.add('visible');
    setTimeout(function() {
      _els.overlay.style.opacity = '0';
      setTimeout(function() {
        _els.overlay.classList.remove('visible');
      }, 300);
    }, duration);
  }

  // ==================== 界面切换 ====================

  function showTitle(title, subtitle) {
    _els.titleScreen.querySelector('.title-text').textContent = title || '';
    _els.titleScreen.querySelector('.subtitle-text').textContent = subtitle || '';
    _els.titleScreen.classList.add('visible');
    _els.textBox.classList.remove('visible');
    hideChoices();
    hideClickIndicator();
  }

  function hideTitle() {
    _els.titleScreen.classList.remove('visible');
  }

  function showEnding(message) {
    _els.endingText.textContent = message || '—— 未完待续 ——';
    _els.endingScreen.classList.add('visible');
    hideClickIndicator();
  }

  function hideEnding() {
    _els.endingScreen.classList.remove('visible');
  }

  function showMenu() {
    _els.menuPanel.classList.add('visible');
  }

  function hideMenu() {
    _els.menuPanel.classList.remove('visible');
  }

  function showSettings(currentTextSpeed, autoMode) {
    var speedSlider = _els.settingsPanel.querySelector('#speed-slider');
    var autoToggle = _els.settingsPanel.querySelector('#auto-toggle');
    if (speedSlider) speedSlider.value = currentTextSpeed;
    if (autoToggle) autoToggle.checked = autoMode;
    _els.settingsPanel.classList.add('visible');
  }

  function hideSettings() {
    _els.settingsPanel.classList.remove('visible');
  }

  function showSaveLoad(mode, slots) {
    var panel = _els.saveLoadPanel;
    var title = panel.querySelector('.panel-title');
    title.textContent = mode === 'save' ? '保存进度' : '读取进度';
    panel.setAttribute('data-mode', mode);

    var slotContainer = panel.querySelector('.slot-list');
    slotContainer.innerHTML = '';

    for (var i = 0; i < 8; i++) {
      var slot = slots[i];
      var slotEl = document.createElement('div');
      slotEl.className = 'save-slot' + (slot ? ' has-data' : '');

      if (slot) {
        var date = new Date(slot.timestamp);
        var timeStr = date.getFullYear() + '/' +
          String(date.getMonth() + 1).padStart(2, '0') + '/' +
          String(date.getDate()).padStart(2, '0') + ' ' +
          String(date.getHours()).padStart(2, '0') + ':' +
          String(date.getMinutes()).padStart(2, '0');

        slotEl.innerHTML =
          '<span class="slot-number">存档 ' + (i + 1) + '</span>' +
          '<span class="slot-info">' + timeStr + '</span>' +
          '<span class="slot-scene">' + (slot.sceneId || '未知场景') + '</span>';
      } else {
        slotEl.innerHTML =
          '<span class="slot-number">存档 ' + (i + 1) + '</span>' +
          '<span class="slot-empty">—— 空 ——</span>';
      }

      slotEl.addEventListener('click', (function(idx) {
        return function() {
          if (mode === 'save') {
            VNSave.saveSlot(idx);
            showSaveLoad('save', VNSave.getAllSlots());
          } else {
            if (slots[idx]) {
              VNSave.loadSlot(idx);
              hideSaveLoad();
              hideMenu();
            }
          }
        };
      })(i));

      slotContainer.appendChild(slotEl);
    }

    panel.classList.add('visible');
  }

  function hideSaveLoad() {
    _els.saveLoadPanel.classList.remove('visible');
  }

  function hideAllPanels() {
    hideMenu();
    hideSettings();
    hideSaveLoad();
  }

  // ==================== 角色清理(读档时) ====================

  function clearAllCharacters() {
    _els.charLayer.innerHTML = '';
  }

  function restoreAllCharacters(charState, config) {
    clearAllCharacters();
    if (!charState || !config) return;
    Object.keys(charState).forEach(function(charId) {
      var info = charState[charId];
      showCharacter(charId, info.position, info.expression, config, 'none');
    });
  }

  // ==================== 公开 API ====================

  return {
    init: init,
    showDialogue: showDialogue,
    showNarration: showNarration,
    skipTypewriter: skipTypewriter,
    isTyping: isTyping,
    clearTypewriter: clearTypewriter,
    setBackground: setBackground,
    showCharacter: showCharacter,
    hideCharacter: hideCharacter,
    updateCharacterExpression: updateCharacterExpression,
    moveCharacter: moveCharacter,
    showChoices: showChoices,
    hideChoices: hideChoices,
    screenShake: screenShake,
    flash: flash,
    showTitle: showTitle,
    hideTitle: hideTitle,
    showEnding: showEnding,
    hideEnding: hideEnding,
    showMenu: showMenu,
    hideMenu: hideMenu,
    showSettings: showSettings,
    hideSettings: hideSettings,
    showSaveLoad: showSaveLoad,
    hideSaveLoad: hideSaveLoad,
    hideAllPanels: hideAllPanels,
    clearAllCharacters: clearAllCharacters,
    restoreAllCharacters: restoreAllCharacters
  };

})();

  </script>
  <script>
/**
 * 白银之城 · 音频系统
 */
const VNAudio = (function() {
  'use strict';

  var _el = null;
  var _vol = 0.5;
  var _cur = null;

  var _files = {
    'bgm_title':'bgm_title.mp3', 'bgm_prologue':'bgm_prologue.mp3',
    'bgm_daily1':'bgm_daily1.mp3', 'bgm_daily2':'bgm_daily2.mp3',
    'bgm_daily3':'bgm_daily3.mp3', 'bgm_bar':'bgm_bar.mp3',
    'bgm_world':'bgm_world.mp3'
  };

  function init() {
    _el = document.getElementById('bgm-audio');
    if (!_el) {
      _el = document.createElement('audio');
      _el.id = 'bgm-audio';
      _el.style.display = 'none';
      document.body.appendChild(_el);
    }
    _el.loop = true;
    _el.volume = _vol;
    // 预加载标题音乐
    _el.src = 'assets/music/bgm_title.mp3';
    _el.load();
    _cur = 'bgm_title';
    console.log('[音频] 就绪');
  }

  function switchTo(id) {
    var file = _files[id];
    if (!file) return;
    var src = 'assets/music/' + file;
    if (_cur === id && _el.src && !_el.paused) return; // 同一首在播，跳过
    _cur = id;

    if (_el.src.indexOf(file) >= 0) {
      // 同一文件只 resume，不重载
      _el.volume = _vol;
      _el.play().then(function() { console.log('[音频] ' + id); })
               .catch(function(e) { console.warn('[音频] 受阻:', e.name); });
    } else {
      _el.src = src;
      _el.volume = _vol;
      _el.play().then(function() { console.log('[音频] ' + id); })
               .catch(function(e) { console.warn('[音频] 受阻:', e.name); });
    }
  }

  function playTitle() { switchTo('bgm_title'); }

  function stop()     { _el.pause(); _cur = null; }
  function setVolume(v) { _vol = v; _el.volume = v; }

  return { init:init, switchTo:switchTo, playTitle:playTitle, stop:stop, setVolume:setVolume };

})();

  </script>
  <script>
/**
 * ========================================
 *  白银之城 · 存档系统
 *  Silver City VN - Save/Load Manager
 * ========================================
 *
 *  负责: localStorage 存档/读档、自动存档、多槽位管理
 */

const VNSave = (function() {
  'use strict';

  const STORAGE_KEY = 'silver_city_vn_saves';
  const AUTO_SLOT = -1;

  // ==================== 存储 ====================

  function _readAll() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : {};
    } catch (e) {
      console.error('[存档] 读取失败:', e);
      return {};
    }
  }

  function _writeAll(data) {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    } catch (e) {
      console.error('[存档] 写入失败 (可能存储空间不足):', e);
    }
  }

  // ==================== 操作 ====================

  function saveSlot(slotIndex) {
    const snapshot = VN.getSaveSnapshot();
    if (!snapshot) return false;

    const all = _readAll();
    all[String(slotIndex)] = snapshot;
    _writeAll(all);
    console.log('[存档] 已保存到槽位 ' + (slotIndex + 1));
    return true;
  }

  function saveAuto(snapshot) {
    const all = _readAll();
    all['_auto'] = snapshot;
    _writeAll(all);
  }

  function loadSlot(slotIndex) {
    const all = _readAll();
    const snapshot = all[String(slotIndex)];
    if (!snapshot) {
      console.warn('[存档] 槽位 ' + (slotIndex + 1) + ' 无存档数据');
      return false;
    }

    VN.restoreSnapshot(snapshot);

    // 恢复视觉状态
    const config = VN.getConfig();
    if (snapshot.currentBg) {
      VNRenderer.setBackground(snapshot.currentBg, config, 'none');
    }
    VNRenderer.clearAllCharacters();
    if (snapshot.charactersOnScreen) {
      VNRenderer.restoreAllCharacters(snapshot.charactersOnScreen, config);
    }
    if (snapshot.currentBgm) {
      VNAudio.playBGM(snapshot.currentBgm, config, 0.7, 500);
    }

    VNRenderer.hideAllPanels();
    VNRenderer.hideTitle();
    VNRenderer.hideEnding();

    console.log('[存档] 从槽位 ' + (slotIndex + 1) + ' 读取成功');
    VN.executeCurrentLine();
    return true;
  }

  function loadAuto() {
    const all = _readAll();
    const snapshot = all['_auto'];
    if (!snapshot) return false;
    VN.restoreSnapshot(snapshot);

    const config = VN.getConfig();
    if (snapshot.currentBg) {
      VNRenderer.setBackground(snapshot.currentBg, config, 'none');
    }
    VNRenderer.clearAllCharacters();
    if (snapshot.charactersOnScreen) {
      VNRenderer.restoreAllCharacters(snapshot.charactersOnScreen, config);
    }
    if (snapshot.currentBgm) {
      VNAudio.playBGM(snapshot.currentBgm, config, 0.7, 500);
    }

    VNRenderer.hideAllPanels();
    VNRenderer.hideTitle();
    VNRenderer.hideEnding();
    VN.executeCurrentLine();
    return true;
  }

  function getSlot(slotIndex) {
    const all = _readAll();
    return all[String(slotIndex)] || null;
  }

  function getAllSlots() {
    const all = _readAll();
    const slots = [];
    for (let i = 0; i < 8; i++) {
      slots.push(all[String(i)] || null);
    }
    return slots;
  }

  function deleteSlot(slotIndex) {
    const all = _readAll();
    delete all[String(slotIndex)];
    _writeAll(all);
    console.log('[存档] 已删除槽位 ' + (slotIndex + 1));
  }

  function hasAnySave() {
    const all = _readAll();
    return Object.keys(all).length > 0;
  }

  return {
    saveSlot: saveSlot,
    saveAuto: saveAuto,
    loadSlot: loadSlot,
    loadAuto: loadAuto,
    getSlot: getSlot,
    getAllSlots: getAllSlots,
    deleteSlot: deleteSlot,
    hasAnySave: hasAnySave
  };

})();

  </script>
  <script>
/**
 * ========================================
 *  白银之城 · 主入口
 *  Silver City VN - Main Entry
 * ========================================
 */

(function() {
  'use strict';

  async function init() {
    VNRenderer.init();
    VNAudio.init();

    const configOk = await VN.loadConfig();
    if (!configOk) {
      alert('配置文件加载失败\n请通过 http://localhost:8080 访问。');
      return;
    }

    var config = VN.getConfig();
    var gameInfo = config.game || {};

    VN.setTextSpeed(gameInfo.default_text_speed || 40);
    VN.onStateChange(handleEngineEvent);
    bindEvents(gameInfo);

    var scriptOk = await VN.loadScript();
    if (!scriptOk) {
      alert('剧本文件加载失败');
      return;
    }

    // 显示启动画面 + 标题插图
    document.getElementById('title-screen').classList.remove('visible');
    document.querySelector('.splash-bg').style.background = 'url(assets/backgrounds/title.png) center/cover no-repeat';
    VNRenderer.setBackground('title_bg', config, 'none');
    var splash = document.getElementById('splash-screen');

    splash.addEventListener('click', function go() {
      splash.removeEventListener('click', go);
      VNAudio.switchTo('bgm_title');
      splash.classList.add('hidden');
      VNRenderer.showTitle(gameInfo.title, gameInfo.subtitle);
    });

    console.log('[主入口] 初始化完成');
  }

  // ==================== 引擎事件 → 渲染器 ====================

  async function handleEngineEvent(event, data) {
    var config = VN.getConfig();
    var state = VN.getState();

    switch (event) {

      case 'dialogue': {
        var cc = data.character ? VN.getCharacter(data.character) : null;
        var name = cc ? cc.name : data.character;
        await VNRenderer.showDialogue(name, data.text, cc, state.textSpeed, data.waitForClick);
        break;
      }
      case 'narration':
        await VNRenderer.showNarration(data.text, state.textSpeed, data.waitForClick);
        break;

      case 'choice':
        VNRenderer.showChoices(data.prompt, data.options);
        break;

      case 'bg_change':
        VNRenderer.setBackground(data.id, config, data.transition);
        break;

      case 'char_show':
        VNRenderer.showCharacter(data.id, data.position, data.expression, config, data.transition);
        break;
      case 'char_hide':
        VNRenderer.hideCharacter(data.id, data.transition);
        break;
      case 'char_expr':
        VNRenderer.updateCharacterExpression(data.id, data.expression, config);
        break;
      case 'char_move':
        VNRenderer.moveCharacter(data.id, data.position, data.duration);
        break;

      case 'bgm':
        VNAudio.switchTo(data.id);
        break;
      case 'bgm_stop':
      case 'sfx':
        break;

      case 'screen_shake':
        VNRenderer.screenShake(data.intensity, data.duration);
        break;
      case 'flash':
        VNRenderer.flash(data.color, data.duration);
        break;

      case 'end':
        VNRenderer.showEnding(data.message);
        break;
      case 'title':
        VNRenderer.hideEnding();
        VNRenderer.setBackground('title_bg', config, 'none');
        VNRenderer.showTitle(config.game.title, config.game.subtitle);
        VNAudio.playTitle();
        break;
      case 'scene_end':
        VNRenderer.showEnding('—— 本章结束 ——');
        break;

      case 'choice_made':
        VNRenderer.hideChoices();
        VNRenderer.hideClickIndicator();
        break;
    }
  }

  // ==================== UI 事件 ====================

  function bindEvents(gameInfo) {
    var gc = document.getElementById('game-container');

    // 点击推进对话
    gc.addEventListener('click', function(e) {
      if (e.target.closest('.choice-btn,.menu-btn,.menu-panel,.settings-panel,.save-load-panel,.title-screen,.ending-screen')) return;
      if (VNRenderer.isTyping()) { VNRenderer.skipTypewriter(); }
      else { VN.handleClick(); VNRenderer.hideClickIndicator(); }
    });

    // 键盘
    document.addEventListener('keydown', function(e) {
      if (e.key === ' ' || e.key === 'Enter') {
        e.preventDefault();
        if (VNRenderer.isTyping()) { VNRenderer.skipTypewriter(); }
        else { VN.handleClick(); VNRenderer.hideClickIndicator(); }
      }
      if (e.key === 'Escape') VNRenderer.hideAllPanels();
    });

    // 新游戏
    var btn = document.getElementById('btn-start');
    if (btn) btn.addEventListener('click', function() {
      VNRenderer.hideTitle(); VNRenderer.hideEnding();
      VNAudio.switchTo('bgm_daily1');
      VN.startGame();
    });

    // 继续
    btn = document.getElementById('btn-continue');
    if (btn) {
      btn.addEventListener('click', function() {
        if (!VNSave.loadAuto()) alert('没有找到自动存档。请先开始新游戏。');
      });
      if (!VNSave.hasAnySave()) btn.style.display = 'none';
    }

    // 菜单
    btn = document.getElementById('btn-menu');
    if (btn) btn.addEventListener('click', function(e) { e.stopPropagation(); VNRenderer.showMenu(); });

    btn = document.getElementById('menu-resume');
    if (btn) btn.addEventListener('click', function() { VNRenderer.hideMenu(); });

    btn = document.getElementById('menu-save');
    if (btn) btn.addEventListener('click', function() { VNRenderer.showSaveLoad('save', VNSave.getAllSlots()); });

    btn = document.getElementById('menu-load');
    if (btn) btn.addEventListener('click', function() { VNRenderer.showSaveLoad('load', VNSave.getAllSlots()); });

    btn = document.getElementById('menu-settings');
    if (btn) btn.addEventListener('click', function() {
      var s = VN.getState(); VNRenderer.showSettings(s.textSpeed, s.autoMode);
    });

    btn = document.getElementById('menu-title');
    if (btn) btn.addEventListener('click', function() {
      VNRenderer.hideMenu(); VNRenderer.hideEnding();
      VNRenderer.clearAllCharacters();
      VNRenderer.setBackground('title_bg', VN.getConfig(), 'none');
      VNRenderer.showTitle(gameInfo.title, gameInfo.subtitle);
      VNAudio.playTitle();
    });

    // 设置
    var sld = document.getElementById('speed-slider');
    if (sld) sld.addEventListener('input', function() { VN.setTextSpeed(parseInt(this.value)); });

    var tog = document.getElementById('auto-toggle');
    if (tog) tog.addEventListener('change', function() { VN.setAutoMode(this.checked); });

    sld = document.getElementById('bgm-volume');
    if (sld) sld.addEventListener('input', function() { VNAudio.setVolume(parseFloat(this.value)); });

    // SFX 音量滑杆仍然存在但不影响任何东西，留着 UI 完整性

    // 关闭按钮
    document.querySelectorAll('.close-btn').forEach(function(b) {
      b.addEventListener('click', function() { VNRenderer.hideAllPanels(); });
    });

    btn = document.getElementById('save-back');
    if (btn) btn.addEventListener('click', function() { VNRenderer.hideSaveLoad(); });

    btn = document.getElementById('settings-back');
    if (btn) btn.addEventListener('click', function() { VNRenderer.hideSettings(); });

    // 结局→标题
    btn = document.getElementById('ending-back');
    if (btn) btn.addEventListener('click', function() {
      VNRenderer.hideEnding(); VNRenderer.clearAllCharacters();
      VNRenderer.setBackground('title_bg', VN.getConfig(), 'none');
      VNRenderer.showTitle(gameInfo.title, gameInfo.subtitle);
      VNAudio.playTitle();
    });
  }

  document.addEventListener('DOMContentLoaded', init);

})();

  </script>
